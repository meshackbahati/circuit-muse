name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-app:
    name: Test App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npx vite build

  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: engine
        run: pip install -r requirements.txt

      - name: Start engine and health check
        run: |
          cd engine
          uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          sleep 5
          curl -sf http://127.0.0.1:8001/health

  test-rust:
    name: Test Rust Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev xdg-utils

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check
