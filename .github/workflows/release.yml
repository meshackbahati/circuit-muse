name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            xdg-utils

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Patch AppImage with GPU env vars
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            EXTRACT_DIR=$(mktemp -d)
            cd "$EXTRACT_DIR"
            "$APPIMAGE" --appimage-extract > /dev/null 2>&1 || true
            if [ -f squashfs-root/AppRun ]; then
              { printf 'export GDK_BACKEND=x11\n'; printf 'export WEBKIT_DISABLE_COMPOSITING_MODE=1\n'; printf 'export WEBKIT_DISABLE_DMABUF_RENDERER=1\n'; printf 'export LIBGL_ALWAYS_SOFTWARE=1\n'; cat squashfs-root/AppRun; } > AppRun.tmp && mv AppRun.tmp squashfs-root/AppRun
              chmod +x squashfs-root/AppRun
            fi
            # Remove bundled Wayland libs to prevent conflicts with host system
            rm -f squashfs-root/usr/lib/libwayland-client.so* squashfs-root/usr/lib/libwayland-cursor.so* squashfs-root/usr/lib/libwayland-egl.so* squashfs-root/usr/lib/libwayland-server.so* 2>/dev/null || true
            cd -
            APPIMAGETOOL=$(mktemp)
            curl -sL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o "$APPIMAGETOOL"
            chmod +x "$APPIMAGETOOL"
            "$APPIMAGETOOL" "$EXTRACT_DIR/squashfs-root" "$APPIMAGE" --no-appstream 2>/dev/null || true
            rm -rf "$EXTRACT_DIR" "$APPIMAGETOOL"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz

  build-fedora:
    name: Build Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y gcc nodejs npm python3 python3-pip webkit2gtk4.1-devel gtk3-devel libsoup3-devel patchelf openssl-devel xdg-utils

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri (RPM only)
        working-directory: src-tauri
        run: cargo tauri build --bundles rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-build
          path: src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Windows_64bit.zip" -o arduino-cli.zip
          7z x arduino-cli.zip -osrc-tauri/binaries/
          ren src-tauri\binaries\arduino-cli.exe arduino-cli-x86_64-pc-windows-msvc.exe

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          .\venv-build\Scripts\activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          copy dist\circuit-muse-engine.exe ..\src-tauri\binaries\circuit-muse-engine-x86_64-pc-windows-msvc.exe

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-macos-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_macOS_ARM64.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-aarch64-apple-darwin
          chmod +x src-tauri/binaries/arduino-cli-aarch64-apple-darwin

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-aarch64-apple-darwin
          chmod +x ../src-tauri/binaries/circuit-muse-engine-aarch64-apple-darwin

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-arch:
    name: Build Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel rust nodejs npm python python-pip webkit2gtk-4.1 appmenu-gtk-module libappindicator-gtk3 librsvg patchelf xdg-utils openssl gtk3 libsoup3

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri (AppImage)
        working-directory: src-tauri
        run: cargo tauri build --bundles appimage

      - name: Create Arch package
        run: |
          mkdir -p arch-package
          cp src-tauri/target/release/bundle/appimage/*.AppImage arch-package/circuit-muse.AppImage || true
          cat > arch-package/PKGBUILD << 'PKGEOF'
          # Maintainer: Meshack Bahati Ouma <meshackbahati@users.noreply.github.com>
          pkgname=circuit-muse
          pkgver=1.0.1
          pkgrel=1
          pkgdesc="AI-powered circuit simulator and embedded board emulator"
          arch=('x86_64')
          url="https://github.com/meshackbahati/circuit-muse"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libsoup3' 'libappindicator-gtk3')
          source=("$pkgname.AppImage")
          sha256sums=('SKIP')
          package() {
            install -Dm755 "$srcdir/$pkgname.AppImage" "$pkgdir/usr/bin/$pkgname"
          }
          PKGEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-build
          path: arch-package/*

  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-arch, build-fedora]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CircuitMuse v1.0.1"
          body: |
            ## CircuitMuse v1.0.1 — First Release

            AI-powered circuit simulator and embedded board emulator for desktop. Design circuits, write Arduino code, and run real emulations — all in one app.

            ### What's Inside

            - **31 emulated boards** — Arduino Uno/Mega/Nano, ESP32/ESP32-S2/ESP32-S3/ESP32-C3, RP2040/RP2350, STM32, ATtiny85, and more
            - **150+ components** — resistors, capacitors, LEDs, sensors, displays, motors, ICs, and wireless modules
            - **Real CPU emulation** — not a toy simulator; actual compiled Arduino firmware running on emulated hardware
            - **SPICE analog simulation** — accurate voltage/current analysis for analog circuits
            - **AI agent** — connect Ollama, OpenAI, Anthropic, Gemini, or OpenRouter for AI-assisted design and debugging
            - **Serial monitor** — real-time serial output from emulated boards
            - **Multi-file sketches** — write Arduino code with multiple .ino and .h files
            - **Library manager** — search and install Arduino libraries directly from the app
            - **Project save/load** — save your circuits and code as shareable project files
            - **Export** — generate Arduino sketches from your circuit designs
            - **Setup wizard** — guided first-run experience with board and AI configuration

            ### Supported Platforms

            | Platform | Format | Notes |
            |----------|--------|-------|
            | **Linux (x86_64)** | AppImage | Universal — works on Ubuntu, Debian, Fedora, Arch, and derivatives |
            | **Linux (x86_64)** | .deb | Debian/Ubuntu/Mint |
            | **Linux (x86_64)** | PKGBUILD | Arch Linux / Manjaro |
            | **Windows (x86_64)** | .exe (NSIS) | Windows 10/11 installer |
            | **Windows (x86_64)** | .msi | Windows MSI installer |
            | **macOS (ARM64)** | .dmg | Apple Silicon (M1/M2/M3/M4) |

            ### System Requirements

            - **RAM**: 4 GB minimum, 8 GB recommended
            - **Disk**: 500 MB free space (includes bundled arduino-cli and board cores)
            - **OS**: Linux (kernel 5.4+), Windows 10+, macOS 12+

            ### First Launch

            1. Open the app — the setup wizard will guide you through board and AI configuration
            2. Pick an emulated board from the canvas
            3. Place components and wire them up
            4. Write Arduino code in the editor
            5. Hit Compile & Run to see your circuit come alive

            ### Known Limitations

            - macOS build is ARM64 only (Apple Silicon). Intel Macs not yet supported.
            - WiFi/Bluetooth emulation is limited to basic packet loops
            - Some advanced ESP32 peripherals (USB-OTG, camera) are not emulated
            - Arduino-cli is bundled but core downloads require internet on first use

            ### Credits

            Built with [Tauri](https://tauri.app/), [React](https://react.dev/), [Pyodide](https://pyodide.org/), and [Arduino CLI](https://arduino.github.io/arduino-cli/).

            Report issues: https://github.com/meshackbahati/circuit-muse/issues
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.rpm
            artifacts/**/PKGBUILD
