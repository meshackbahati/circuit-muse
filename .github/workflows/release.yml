name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/1.2.1/arduino-cli_1.2.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/1.2.1/arduino-cli_1.2.1_Windows_64bit.zip" -o arduino-cli.zip
          7z x arduino-cli.zip -osrc-tauri/binaries/
          ren src-tauri\binaries\arduino-cli.exe arduino-cli-x86_64-pc-windows-msvc.exe

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-macos-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/1.2.1/arduino-cli_1.2.1_macOS_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-apple-darwin
          chmod +x src-tauri/binaries/arduino-cli-x86_64-apple-darwin

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app
