name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            xdg-utils

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz

  build-fedora:
    name: Build Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y gcc nodejs npm python3 python3-pip webkit2gtk4.1-devel gtk3-devel libsoup3-devel patchelf openssl-devel xdg-utils

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri (RPM only)
        working-directory: src-tauri
        run: cargo tauri build --bundles rpm

      - name: Create RPM spec
        run: |
          mkdir -p rpm-package
          cat > rpm-package/circuit-muse.spec << 'SPEC'
          Name:           circuit-muse
          Version:        1.0.1
          Release:        1%{?dist}
          Summary:        AI-powered circuit simulator and embedded board emulator
          License:        MIT
          URL:            https://github.com/meshackbahati/circuit-muse
          Packager:       Meshack Bahati Ouma
          
          %description
          CircuitMuse is an AI-powered circuit simulator with real CPU emulation,
          SPICE analog simulation, 31 boards, 150+ components.
          
          %install
          mkdir -p %{_bindir}
          cp src-tauri/target/release/bundle/appimage/*.AppImage %{_bindir}/circuit-muse || true
          chmod 755 %{_bindir}/circuit-muse
          
          %files
          %{_bindir}/circuit-muse
          SPEC

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-build
          path: rpm-package/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Windows_64bit.zip" -o arduino-cli.zip
          7z x arduino-cli.zip -osrc-tauri/binaries/
          ren src-tauri\binaries\arduino-cli.exe arduino-cli-x86_64-pc-windows-msvc.exe

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          .\venv-build\Scripts\activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          copy dist\circuit-muse-engine.exe ..\src-tauri\binaries\circuit-muse-engine-x86_64-pc-windows-msvc.exe

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-macos-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_macOS_ARM64.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-aarch64-apple-darwin
          chmod +x src-tauri/binaries/arduino-cli-aarch64-apple-darwin

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-aarch64-apple-darwin
          chmod +x ../src-tauri/binaries/circuit-muse-engine-aarch64-apple-darwin

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-arch:
    name: Build Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel rust nodejs npm python python-pip webkit2gtk-4.1 appmenu-gtk-module libappindicator-gtk3 librsvg patchelf xdg-utils openssl gtk3 libsoup3

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download arduino-cli
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz" | tar xz -C src-tauri/binaries/
          mv src-tauri/binaries/arduino-cli src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/arduino-cli-x86_64-unknown-linux-gnu

      - name: Build engine with PyInstaller
        run: |
          cd engine
          python -m venv venv-build
          source venv-build/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --clean --noconfirm --onefile --name circuit-muse-engine app/main.py
          cp dist/circuit-muse-engine ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/circuit-muse-engine-x86_64-unknown-linux-gnu

      - name: Install app dependencies and build
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Build Tauri (deb only)
        working-directory: src-tauri
        run: cargo tauri build --bundles deb

      - name: Create Arch package
        run: |
          mkdir -p arch-package
          cp src-tauri/target/release/bundle/appimage/*.AppImage arch-package/circuit-muse.AppImage || true
          cat > arch-package/PKGBUILD << 'PKGEOF'
          # Maintainer: Meshack Bahati Ouma <meshackbahati@users.noreply.github.com>
          pkgname=circuit-muse
          pkgver=1.0.1
          pkgrel=1
          pkgdesc="AI-powered circuit simulator and embedded board emulator"
          arch=('x86_64')
          url="https://github.com/meshackbahati/circuit-muse"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libsoup3' 'libappindicator-gtk3')
          source=("$pkgname.AppImage")
          sha256sums=('SKIP')
          package() {
            install -Dm755 "$srcdir/$pkgname.AppImage" "$pkgdir/usr/bin/$pkgname"
          }
          PKGEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-build
          path: arch-package/*

  create-release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-arch, build-fedora]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/PKGBUILD
